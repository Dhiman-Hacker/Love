<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="Style.css">
    <title>my special</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ff69b4, #ffc0cb, #ffe4ec);
            overflow: hidden;
            text-align: center;
        }

        .box {
            position: relative;
            z-index: -10000000000000000000000000000;
            background: #fff;
            padding: 25px;
            border-radius: 20px;
            width: 320px;
            box-shadow: 0 0 20px rgba(0, 0, 0, .3);
            animation: pop .7s;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #ff4081;
            color: #fff;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        .paper {
            background: #fff8dc;
            padding: 20px;
            border: 2px dashed #999;
            border-radius: 10px;
            margin: 15px 0;
            min-height: 80px;
            animation: fade .5s;
        }

        .hidden {
            display: none;
        }

        @keyframes pop {
            from {
                transform: scale(.5);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .balloon {
            position: absolute;
            bottom: -100px;
            font-size: 35px;
            animation: fly 8s linear infinite;
        }

        @keyframes fly {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-120vh);
            }
        }

        #final {
            font-size: 30px;
            color: #ff0066;
            animation: zoom 1s infinite alternate;
        }

        @keyframes zoom {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.2);
            }
        }

        .photo {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid white;
            margin: 15px auto;
            display: block;
            box-shadow: 0 0 30px #ff1493;
            animation: photoShow 2s ease-in-out infinite alternate;
        }

        @keyframes photoShow {
            from {
                transform: scale(0.7) rotate(-8deg);
                opacity: 0;
            }

            to {
                transform: scale(1.05) rotate(8deg);
                opacity: 1;
                box-shadow: 0 0 45px #ff69b4;
            }
        }
    </style>
</head>

<body>
    <div class="box" id="start">
        <h2>💖 My Special 💖</h2>
        <p>A little surprise is waiting for you...</p>
        <button onclick="start()">Start</button>
    </div>
    <div class="box hidden" id="paperBox">
        <div class="paper" id="paper"></div>
        <button onclick="next()">Next</button>
    </div>
    <div class="box hidden" id="end">
        <div id="final">
            🎂 Happy Birthday 🎂<br>
            my special and everything ❤️
            <img class="photo" src="gudmaran.jpeg">
        </div>
    </div>
    <script>
        let msg = [
            "🌸 You are an amazing friend.",
            "😊 Keep smiling always.",
            "⭐ May all your dreams come true.",
            "🎁 Enjoy every moment of today.",
            "❤️ Stay happy forever!"
        ];
        let i = 0;
        function start() {
            document.getElementById("start").classList.add("hidden");
            document.getElementById("paperBox").classList.remove("hidden");
            paper.innerHTML = msg[0];
        }
        function next() {
            i++;
            if (i < msg.length) {
                paper.innerHTML = msg[i];
            } else {
                document.getElementById("paperBox").classList.add("hidden");
                document.getElementById("end").classList.remove("hidden");
            }
        }
        for (let j = 0; j < 20; j++) {
            let b = document.createElement("div");
            b.className = "balloon";
            b.innerHTML = "💕🎉💖🎈🎇✨";
            b.style.left = Math.random() * 100 + "%";
            b.style.animationDuration = (5 + Math.random() * 5) + "s";
            b.style.fontSize = (20 + Math.random() * 30) + "px";
            document.body.appendChild(b);
        }
    </script>
</body>

</html>
